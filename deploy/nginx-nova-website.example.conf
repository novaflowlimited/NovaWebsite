# Example nginx reverse proxy for NovaWebsite (Next.js behind PM2 on port 3000).
# Copy to e.g. /etc/nginx/sites-available/nova-website, adjust server_name and SSL paths,
# then: sudo ln -s ... sites-enabled/ && sudo nginx -t && sudo systemctl reload nginx
#
# TLS: use certbot (Let's Encrypt) or your own certificates on listen 443.

upstream nova_website_next {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    client_max_body_size 25M;

    location / {
        proxy_pass http://nova_website_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}

# After certbot, add a second server { listen 443 ssl; ... } block or let certbot modify this file.
