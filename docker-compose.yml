# Local PostgreSQL for development. Start: `docker compose up -d`
# Host port 5433 avoids conflict when another Postgres already uses 5432 on the machine.
# Set DATABASE_URL to ...@localhost:5433/... (see .env.example). Then:
#   npm run db:migrate && npm run db:seed
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: novaflow
      POSTGRES_PASSWORD: novaflow
      POSTGRES_DB: novaflow
    ports:
      - "5433:5432"
    volumes:
      - novaflow_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novaflow -d novaflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  novaflow_pg:
