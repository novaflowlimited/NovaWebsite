# Local PostgreSQL for development. Start: `docker compose up -d`
# Then set DATABASE_URL in .env to match POSTGRES_* below and run:
#   npm run db:migrate && npm run db:seed
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: novaflow
      POSTGRES_PASSWORD: novaflow
      POSTGRES_DB: novaflow
    ports:
      - "5432:5432"
    volumes:
      - novaflow_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novaflow -d novaflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  novaflow_pg:
